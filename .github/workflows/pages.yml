# Deploy DIGITAL TATTOO to GitHub Pages.
# CI ships lite (0.5B) + swallow/TinySwallow (1.5B, recommended default) same-origin
# (swallow ships full weights because its HF repo lacks tensor-cache.json, which
# web-llm 0.2.84 requires — remote HF+IndexedDB loading is broken for it otherwise).
# Runtime: other models (1.5B/3B/Qwen3/…) stay selectable via Hugging Face + IndexedDB
# (cacheBackend indexeddb — no Cache.add). Override pack:
#   repo var FETCH_MODELS=pages|default|all  or workflow_dispatch model_pack.
#
# Full 0.5+1.5+3B same-origin: 公開準備.bat / Netlify / self-host.
#
# One-time setup (repo Settings):
#   1. Settings → Pages → Build and deployment → Source: GitHub Actions
#   2. Settings → Actions → General → Workflow permissions:
#        "Read and write permissions" (or ensure pages write via this workflow)
#
# Site URL (project Pages): https://<user>.github.io/<repo>/
#
# WebLLM requires weights under models/<id>/resolve/main/ (same-origin only).
# UI greys out missing / Pages-unsafe models at runtime — not hard-coded forever.

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      model_pack:
        description: "Models to fetch (lite=Pages-safe; pages=lite; default=1.5B; all=0.5+1.5+3B)"
        type: choice
        options:
          - lite
          - pages
          - default
          - all
        default: lite

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch WebLLM models into public/models
        env:
          FETCH_MODELS: ${{ vars.FETCH_MODELS }}
        run: |
          PACK="${{ github.event.inputs.model_pack }}"
          if [ -z "$PACK" ] || [ "$PACK" = "null" ]; then
            PACK="${FETCH_MODELS:-lite}"
          fi
          echo "Model pack: $PACK"
          case "$PACK" in
            all)
              npm run fetch-model:all
              ;;
            default|1.5b)
              npm run fetch-model
              ;;
            pages)
              npm run fetch-model:pages
              ;;
            lite|0.5b|*)
              # default Pages pack: lite weights + remote-model WASM libs
              npm run fetch-model:pages
              ;;
          esac

      - name: Verify model layout (resolve/main + shards)
        env:
          FETCH_MODELS: ${{ vars.FETCH_MODELS }}
        run: |
          PACK="${{ github.event.inputs.model_pack }}"
          if [ -z "$PACK" ] || [ "$PACK" = "null" ]; then
            PACK="${FETCH_MODELS:-lite}"
          fi
          case "$PACK" in
            all)
              npm run verify-models -- --require-lite --require-hq
              ;;
            default|1.5b)
              npm run verify-models
              ;;
            *)
              npm run verify-models -- --require-lite --allow-missing-default
              ;;
          esac

      - name: Build static site
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Verify dist/models is complete
        env:
          FETCH_MODELS: ${{ vars.FETCH_MODELS }}
        run: |
          PACK="${{ github.event.inputs.model_pack }}"
          if [ -z "$PACK" ] || [ "$PACK" = "null" ]; then
            PACK="${FETCH_MODELS:-lite}"
          fi
          case "$PACK" in
            all)
              npm run verify-models -- dist --require-lite --require-hq
              ;;
            default|1.5b)
              npm run verify-models -- dist
              ;;
            *)
              npm run verify-models -- dist --require-lite --allow-missing-default
              ;;
          esac

      - name: Assert browser model paths exist in dist
        run: |
          CFG05="dist/models/Qwen2.5-0.5B-Instruct-q4f16_1-MLC/resolve/main/mlc-chat-config.json"
          WASM05="dist/models/libs/Qwen2-0.5B-Instruct-q4f16_1_cs1k-webgpu.wasm"
          if [ -f "$CFG05" ]; then
            test -f "$WASM05" || { echo "FAIL missing $WASM05"; exit 1; }
            grep -q model_type "$CFG05" || { echo "FAIL $CFG05 not MLC JSON"; exit 1; }
            echo "OK lite (0.5B) present"
          fi
          CFG15="dist/models/Qwen2.5-1.5B-Instruct-q4f16_1-MLC/resolve/main/mlc-chat-config.json"
          if [ -f "$CFG15" ]; then
            echo "NOTE: 1.5B present in dist (may fail Cache.add on live Pages)"
          fi
          du -sh dist/models
          echo "OK site base: /${{ github.event.repository.name }}/models/.../resolve/main/"
          # Remote-model WASM (TinySwallow q4f32 / Qwen 1.5B q4f16) should ship with Pages
          WASM_SW="dist/models/libs/Qwen2-1.5B-Instruct-q4f32_1_cs1k-webgpu.wasm"
          WASM_15="dist/models/libs/Qwen2-1.5B-Instruct-q4f16_1_cs1k-webgpu.wasm"
          if [ -f "$WASM_SW" ]; then echo "OK TinySwallow WASM present"; else echo "WARN missing $WASM_SW (HF load may need jsDelivr)"; fi
          if [ -f "$WASM_15" ]; then echo "OK Qwen1.5B WASM present"; else echo "WARN missing $WASM_15"; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
