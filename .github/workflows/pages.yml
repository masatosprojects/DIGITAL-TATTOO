# Deploy DIGITAL TATTOO to GitHub Pages.
# Default model (~300 MB) is fetched in CI — do not commit public/models binaries.
# Plus 1.5B (~830 MB) is NOT fetched in CI: dual models ≈ 1.1 GB exceed Pages comfort.
# For plus on Pages you'd need a different host (Netlify etc.) or fetch-model:plus locally.
#
# One-time setup (repo Settings):
#   1. Settings → Pages → Build and deployment → Source: GitHub Actions
#   2. Settings → Actions → General → Workflow permissions:
#        "Read and write permissions" (or ensure pages write via this workflow)
#
# Site URL (project Pages): https://<user>.github.io/<repo>/
#
# WebLLM requires weights under models/<id>/resolve/main/ (same-origin only;
# never Hugging Face at runtime). fetch-model + verify-models enforce this.

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Default 0.5B only (~300 MB). Plus 1.5B is optional / local-Netlify.
      - name: Fetch default WebLLM model into public/models
        run: npm run fetch-model

      - name: Verify model layout (resolve/main)
        run: npm run verify-models

      # vite.config.js sets base to /<repo>/ when GITHUB_ACTIONS + GITHUB_REPOSITORY
      - name: Build static site
        run: npm run build

      - name: Verify dist/models is complete
        run: npm run verify-models -- dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
