<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL TATTOO — 尋問ゲーム</title>
    <style>
        :root {
            --bg: #050805;
            --fg: #c8e6c8;
            --dim: #5a7a5a;
            --green: #39ff14;
            --amber: #c8b060;
            --warn: #c05050;
            --think: #6a8a6a;
            --a00: #7ec8e8;
            --a01: #c8b060;
            --a02: #b8a0d0;
            --scan: rgba(57, 255, 20, 0.03);
            --font: "Cascadia Code", "Consolas", "MS Gothic", "Yu Gothic", "Hiragino Sans", ui-monospace, monospace;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg); /* solid dark fallback if floral image missing */
            color: var(--fg);
            font-family: var(--font);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Full-bleed floral atmosphere; dark scrim keeps console text readable */
        #atmosphere {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-color: var(--bg);
            background-image:
                radial-gradient(
                    ellipse at 50% 45%,
                    rgba(0, 0, 0, 0.28) 0%,
                    rgba(0, 0, 0, 0.55) 55%,
                    rgba(0, 0, 0, 0.78) 100%
                ),
                linear-gradient(
                    180deg,
                    rgba(5, 8, 5, 0.5) 0%,
                    rgba(5, 8, 5, 0.22) 42%,
                    rgba(5, 8, 5, 0.58) 100%
                ),
                url("%BASE_URL%bg-floral.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #atmosphere::after {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                var(--scan) 2px,
                var(--scan) 4px
            );
            opacity: 0.45;
        }

        /* Frosted console — floral peeks at edges / around the frame */
        #app {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: calc(100% - 28px);
            max-width: 920px;
            margin: 14px auto;
            padding: 12px 14px 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(16px) saturate(0.9);
            -webkit-backdrop-filter: blur(16px) saturate(0.9);
            border: 1px solid rgba(90, 122, 90, 0.32);
            box-shadow:
                0 0 0 1px rgba(0, 0, 0, 0.45),
                0 18px 48px rgba(0, 0, 0, 0.55);
        }

        #status {
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            color: var(--dim);
            padding: 4px 2px 8px;
            border-bottom: 1px solid rgba(90, 122, 90, 0.25);
            user-select: none;
        }

        #status .brand {
            color: var(--green);
            opacity: 0.75;
        }

        #coherenceBar {
            flex: 1;
            max-width: 180px;
            height: 3px;
            background: rgba(90, 122, 90, 0.2);
            align-self: center;
            overflow: hidden;
        }

        #coherenceBar > i {
            display: block;
            height: 100%;
            width: 100%;
            background: var(--green);
            transition: width 0.4s ease, background 0.6s ease;
        }

        #engineBadge {
            font-size: 0.55rem;
            letter-spacing: 0.08em;
            color: var(--dim);
            white-space: nowrap;
        }
        #engineBadge.llm { color: var(--green); opacity: 0.7; }
        #engineBadge.fallback { color: var(--amber); opacity: 0.85; }

        #originPin {
            flex: 0 0 auto;
            font-size: 0.68rem;
            line-height: 1.45;
            color: var(--amber);
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            padding: 0 2px;
            border-bottom: 1px solid transparent;
            transition: opacity 0.35s, max-height 0.35s, padding 0.35s;
        }
        #originPin.show {
            opacity: 0.92;
            max-height: 4.5em;
            padding: 8px 2px 10px;
            border-bottom-color: rgba(200, 176, 96, 0.22);
        }
        #originPin .tag {
            color: var(--dim);
            letter-spacing: 0.1em;
            font-size: 0.6rem;
            margin-right: 0.6em;
        }
        #originPin .hint {
            color: var(--dim);
            font-size: 0.58rem;
            margin-left: 0.5em;
        }

        #hypBar {
            flex: 0 0 auto;
            display: none;
            gap: 12px;
            font-size: 0.68rem;
            line-height: 1.4;
            padding: 6px 2px 8px;
            border-bottom: 1px solid rgba(90, 122, 90, 0.2);
            color: var(--dim);
        }
        #controls.show ~ #hypBar,
        #app.playing #hypBar { display: flex; }
        #hypBar.show { display: flex; }
        #hypBar .hyp {
            flex: 1;
            min-width: 0;
        }
        #hypBar .hyp-tag {
            letter-spacing: 0.08em;
            font-size: 0.58rem;
            margin-right: 0.4em;
        }
        #hypBar .hyp01 .hyp-tag { color: var(--a01); }
        #hypBar .hyp02 .hyp-tag { color: var(--a02); }
        #hypBar .hyp-val {
            color: var(--fg);
            opacity: 0.85;
            word-break: break-word;
        }

        #log {
            flex: 1 1 auto;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 2px 20px;
            font-size: clamp(0.82rem, 1.6vw, 0.95rem);
            line-height: 1.75;
            word-break: break-word;
            scroll-behavior: smooth;
        }

        #log::-webkit-scrollbar { width: 6px; }
        #log::-webkit-scrollbar-thumb {
            background: rgba(90, 122, 90, 0.4);
        }

        .line {
            margin: 0 0 0.55em;
            white-space: pre-wrap;
        }

        .line.system { color: var(--dim); }
        .line.system.win { color: var(--green); }
        .line.system.lose { color: var(--warn); opacity: 0.9; }
        .line.ai { color: var(--fg); }
        .line.user { color: var(--amber); }
        .line.a00 { color: var(--a00); }
        .line.a01 { color: var(--a01); }
        .line.a02 { color: var(--a02); }
        .line.debate { opacity: 0.92; font-size: 0.95em; }
        .line.status {
            color: var(--think);
            border-left: 2px solid rgba(90, 122, 90, 0.35);
            padding-left: 0.55em;
            opacity: 0.9;
            font-size: 0.92em;
        }

        /* ── Thinking transparency ── */
        .think-wrap {
            margin: 0.65em 0 0.35em;
        }
        .think-wrap.think-done {
            opacity: 0.82;
        }
        .think-panel {
            border: 1px solid rgba(90, 122, 90, 0.35);
            background: rgba(8, 14, 8, 0.75);
            font-size: 0.72rem;
            line-height: 1.5;
        }
        .think-summary {
            cursor: pointer;
            list-style: none;
            padding: 0.45em 0.65em;
            color: var(--think);
            letter-spacing: 0.06em;
            user-select: none;
        }
        .think-summary::-webkit-details-marker { display: none; }
        .think-summary::before {
            content: "▸ ";
            color: var(--dim);
        }
        .think-panel[open] > .think-summary::before {
            content: "▾ ";
        }
        .think-panel[open] > .think-summary {
            border-bottom: 1px solid rgba(90, 122, 90, 0.25);
            color: var(--amber);
        }
        .think-body {
            padding: 0.5em 0.65em 0.7em;
            max-height: min(42vh, 360px);
            overflow-y: auto;
        }
        .think-sec { margin: 0 0 0.65em; }
        .think-lab {
            color: var(--dim);
            letter-spacing: 0.08em;
            font-size: 0.65rem;
            margin-bottom: 0.2em;
        }
        .think-pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            color: #9ab89a;
            font-family: inherit;
            font-size: 0.7rem;
        }
        .think-prompt .think-pre { color: #7a9a7a; }
        .think-raw .think-pre { color: var(--amber); opacity: 0.9; }
        .think-out .think-pre { color: var(--green); opacity: 0.85; }
        .think-origin .think-pre { color: var(--amber); }
        .think-belief .think-pre { color: #c8a070; }
        .think-warn .think-pre { color: var(--warn); }
        .think-user .think-pre { color: var(--amber); }
        .think-meta .think-pre { color: var(--dim); }
        .think-mem .think-pre { color: #8aa88a; }

        .caret {
            display: inline-block;
            width: 0.55em;
            height: 1.05em;
            background: var(--green);
            vertical-align: text-bottom;
            margin-left: 1px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        #controls {
            display: none;
            flex: 0 0 auto;
            gap: 8px;
            flex-wrap: wrap;
            padding: 8px 2px 0;
            border-top: 1px solid rgba(90, 122, 90, 0.25);
        }
        #controls.show { display: flex; }
        #controls button {
            background: transparent;
            border: 1px solid rgba(90, 122, 90, 0.45);
            color: var(--fg);
            font-family: inherit;
            font-size: 0.68rem;
            letter-spacing: 0.06em;
            padding: 6px 12px;
            cursor: pointer;
        }
        #controls button:hover {
            border-color: var(--green);
            color: var(--green);
        }

        #inputRow {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 0;
            padding: 10px 2px 14px;
            border-top: 1px solid rgba(90, 122, 90, 0.3);
            background: rgba(0, 0, 0, 0.45);
        }

        #promptMark {
            color: var(--green);
            font-size: 0.95rem;
            user-select: none;
            padding-right: 6px;
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--fg);
            font-family: inherit;
            font-size: clamp(0.82rem, 1.6vw, 0.95rem);
            caret-color: var(--green);
            min-width: 0;
        }

        #userInput::placeholder { color: var(--dim); opacity: 0.7; }
        #userInput:disabled {
            opacity: 0.45;
            cursor: wait;
        }

        #warn {
            position: absolute;
            bottom: 52px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--warn);
            letter-spacing: 0.1em;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            white-space: nowrap;
        }
        #warn.show { opacity: 1; }

        #app.shake-low {
            animation: shake1 0.5s ease-in-out infinite;
        }
        #app.shake-mid {
            animation: shake2 0.28s ease-in-out infinite;
        }
        #app.shake-high {
            animation: shake3 0.14s linear infinite;
        }

        @keyframes shake1 {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(-0.5px, 0.5px); }
            75% { transform: translate(0.5px, -0.5px); }
        }
        @keyframes shake2 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-1.5px, 1px); }
            40% { transform: translate(1px, -1px); }
            60% { transform: translate(-1px, -0.5px); }
            80% { transform: translate(1.5px, 0.5px); }
        }
        @keyframes shake3 {
            0%, 100% { transform: translate(0) skewX(0deg); }
            25% { transform: translate(-3px, 1px) skewX(-0.3deg); }
            50% { transform: translate(2px, -2px) skewX(0.4deg); }
            75% { transform: translate(-1px, 2px) skewX(-0.2deg); }
        }

        #glitchOverlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            mix-blend-mode: screen;
            background:
                linear-gradient(90deg, transparent 40%, rgba(57, 255, 20, 0.04) 50%, transparent 60%),
                repeating-linear-gradient(
                    0deg,
                    transparent 0,
                    transparent 3px,
                    rgba(200, 50, 50, 0.03) 3px,
                    rgba(200, 50, 50, 0.03) 4px
                );
            transition: opacity 0.5s;
        }
        #glitchOverlay.active { opacity: 1; }

        /* ── Model loading gate ── */
        #modelGate {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 24px;
            background:
                radial-gradient(ellipse at 50% 40%, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0.82) 70%),
                rgba(5, 8, 5, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: opacity 0.45s, visibility 0.45s;
        }
        #modelGate.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #modelGate .gate-brand {
            color: var(--green);
            font-size: clamp(1.1rem, 3vw, 1.45rem);
            letter-spacing: 0.18em;
            opacity: 0.9;
        }
        #modelGate .gate-sub {
            color: var(--dim);
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            margin-top: -6px;
        }
        #gateMsg {
            color: var(--fg);
            font-size: 0.85rem;
            text-align: center;
            max-width: 36em;
            line-height: 1.6;
            min-height: 2.8em;
        }
        #gateBar {
            width: min(320px, 80vw);
            height: 3px;
            background: rgba(90, 122, 90, 0.25);
            overflow: hidden;
        }
        #gateBar > i {
            display: block;
            height: 100%;
            width: 0%;
            background: var(--green);
            transition: width 0.2s ease;
        }
        #gatePct {
            color: var(--dim);
            font-size: 0.7rem;
            letter-spacing: 0.12em;
        }
        #gateHint {
            color: var(--dim);
            font-size: 0.65rem;
            text-align: center;
            max-width: 34em;
            line-height: 1.55;
            margin-top: 8px;
            opacity: 0.85;
        }
        #gateModelPick {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: min(360px, 88vw);
            margin-top: 4px;
        }
        .gate-model-opt {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid rgba(90, 122, 90, 0.35);
            background: rgba(8, 14, 8, 0.55);
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: var(--fg);
            transition: border-color 0.2s, opacity 0.2s;
        }
        .gate-model-opt:hover:not(:disabled):not(.unavailable) {
            border-color: rgba(57, 255, 20, 0.45);
        }
        .gate-model-opt.selected {
            border-color: var(--green);
            background: rgba(20, 40, 24, 0.65);
        }
        .gate-model-opt.unavailable,
        .gate-model-opt:disabled {
            opacity: 0.42;
            cursor: not-allowed;
        }
        .gate-model-opt input {
            margin-top: 3px;
            accent-color: var(--green);
        }
        .gate-model-opt .opt-body {
            flex: 1;
            min-width: 0;
        }
        .gate-model-opt .opt-label {
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            color: var(--fg);
        }
        .gate-model-opt .opt-hint {
            font-size: 0.62rem;
            color: var(--dim);
            line-height: 1.45;
            margin-top: 3px;
        }
        .gate-model-opt .opt-miss {
            font-size: 0.6rem;
            color: var(--amber);
            margin-top: 4px;
            line-height: 1.4;
        }
        #gateLoad {
            background: transparent;
            border: 1px solid rgba(57, 255, 20, 0.55);
            color: var(--green);
            font-family: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            padding: 10px 18px;
            cursor: pointer;
            margin-top: 6px;
        }
        #gateLoad:hover:not(:disabled) {
            background: rgba(57, 255, 20, 0.08);
        }
        #gateLoad:disabled {
            opacity: 0.4;
            cursor: wait;
            border-color: rgba(90, 122, 90, 0.4);
            color: var(--dim);
        }
        #gateActions {
            display: none;
            margin-top: 8px;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #gateActions.show { display: flex; }
        #gateSkip {
            background: transparent;
            border: 1px solid rgba(90, 122, 90, 0.45);
            color: var(--fg);
            font-family: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            padding: 8px 16px;
            cursor: pointer;
        }
        #gateSkip:hover {
            border-color: var(--green);
            color: var(--green);
        }

        @media (max-width: 520px) {
            #app {
                height: calc(100% - 16px);
                margin: 8px;
                max-width: none;
                padding: 10px 10px 0;
                background: rgba(0, 0, 0, 0.86);
            }
            #status { font-size: 0.55rem; letter-spacing: 0.06em; }
            #coherenceBar { max-width: 80px; }
            #originPin { font-size: 0.62rem; }
            #engineBadge { display: none; }
            #hypBar { flex-direction: column; gap: 4px; }
        }

        @media (prefers-reduced-transparency: reduce) {
            #app {
                background: rgba(5, 8, 5, 0.96);
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
            #modelGate {
                background: rgba(5, 8, 5, 0.98);
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
        }
    </style>
</head>
<body>
    <div id="atmosphere" aria-hidden="true"></div>
    <div id="glitchOverlay" aria-hidden="true"></div>

    <div id="modelGate" role="status" aria-live="polite">
        <div class="gate-brand">DIGITAL TATTOO</div>
        <div class="gate-sub">INTERROGATION · IN-BROWSER LLM</div>
        <div id="gateMsg">WebGPU を確認しています…</div>
        <div id="gateModelPick" role="radiogroup" aria-label="モデル選択">
            <!-- options filled by js/app.js from listModels() -->
        </div>
        <button type="button" id="gateLoad" disabled>モデルを読み込む</button>
        <div id="gateBar"><i id="gateFill"></i></div>
        <div id="gatePct">—</div>
        <div id="gateHint">
            同一オリジンの <code>models/</code> のみ（実行中の外部通信なし）。Chrome / Edge + WebGPU。<br>
            ORIGIN は AGENT-00 のみが知る。育ちは文脈汚染であり重み更新ではない。
        </div>
        <div id="gateActions">
            <button type="button" id="gateSkip">テンプレートエンジンで続行</button>
        </div>
    </div>

    <div id="app">
        <div id="status">
            <span class="brand">DIGITAL TATTOO // 00·01·02</span>
            <div id="coherenceBar" title="pollution"><i id="coherenceFill"></i></div>
            <span id="coherenceLabel">R0/12 · POL 0 · 準備</span>
            <span id="engineBadge">LLM …</span>
        </div>

        <div id="originPin" aria-live="polite">
            <span class="tag">ORIGIN</span><span id="originText"></span>
            <span class="hint">（オペレーターのみ · 01/02 には秘匿）</span>
        </div>

        <div id="hypBar" aria-live="polite">
            <div class="hyp hyp01"><span class="hyp-tag">01 仮説</span><span class="hyp-val" id="hyp01">—</span></div>
            <div class="hyp hyp02"><span class="hyp-tag">02 仮説</span><span class="hyp-val" id="hyp02">—</span></div>
        </div>

        <div id="log" aria-live="polite"></div>

        <div id="controls">
            <button type="button" id="btnInject">質問を提案</button>
            <button type="button" id="btnGuess">正式推測を強制</button>
            <button type="button" id="btnPause">一時停止</button>
        </div>

        <div id="warn">日本語のみ入力できます</div>
        <form id="inputRow" autocomplete="off">
            <span id="promptMark">&gt;</span>
            <input type="text" id="userInput" maxlength="240" lang="ja"
                   placeholder="モデル準備中…" spellcheck="false" disabled>
        </form>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
